<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="7" fill="#111318"/>
  <!-- Head -->
  <ellipse cx="16" cy="19" rx="10" ry="9" fill="#7a7a8a"/>
  <!-- Ears -->
  <ellipse cx="7" cy="10" rx="4" ry="5" fill="#7a7a8a"/>
  <ellipse cx="25" cy="10" rx="4" ry="5" fill="#7a7a8a"/>
  <!-- Inner ears -->
  <ellipse cx="7" cy="11" rx="2.5" ry="3" fill="#c084a0"/>
  <ellipse cx="25" cy="11" rx="2.5" ry="3" fill="#c084a0"/>
  <!-- Mask -->
  <ellipse cx="11" cy="17" rx="5" ry="4" fill="#2a2a38"/>
  <ellipse cx="21" cy="17" rx="5" ry="4" fill="#2a2a38"/>
  <rect x="14" y="14" width="4" height="4" fill="#2a2a38"/>
  <!-- Eye whites -->
  <ellipse cx="11" cy="17" rx="3.5" ry="3" fill="#e8e8f0"/>
  <ellipse cx="21" cy="17" rx="3.5" ry="3" fill="#e8e8f0"/>
  <!-- Pupils -->
  <ellipse cx="11" cy="17" rx="2" ry="2" fill="#111318"/>
  <ellipse cx="21" cy="17" rx="2" ry="2" fill="#111318"/>
  <!-- Shine -->
  <circle cx="12" cy="16" r="0.8" fill="white"/>
  <circle cx="22" cy="16" r="0.8" fill="white"/>
  <!-- Nose -->
  <ellipse cx="16" cy="21" rx="2.5" ry="2" fill="#2a2a38"/>
  <!-- Muzzle -->
  <ellipse cx="16" cy="24" rx="5" ry="3.5" fill="#c8c8d8"/>
</svg>
